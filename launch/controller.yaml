    pid: {p: 100.0, i: 0.01, d: 10.0}
  L_AnklePitch_Joint_position_controller:
    type: effort_controllers/JointPositionController
    joint: L_AnklePitch_Joint
    pid: {p: 100.0, i: 0.01, d: 10.0}
  R_AnklePitch_Joint_position_controller:
    type: effort_controllers/JointPositionController
    joint: R_AnklePitch_Joint
    pid: {p: 100.0, i: 0.01, d: 10.0}
  L_AnkleRoll_Joint_position_controller:
    type: effort_controllers/JointPositionController
    joint: L_AnkleRoll_Joint
    pid: {p: 100.0, i: 0.01, d: 10.0}
  R_AnkleRoll_Joint_position_controller:
